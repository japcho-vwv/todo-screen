name: 앱 빌드 및 배포

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: "dist-app/*.exe"
          - os: macos-latest
            platform: mac
            artifact: "dist-app/*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact: "dist-app/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 패키지 설치
        run: npm install --no-package-lock

      - name: 앱 빌드
        run: npm run package:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: GitHub Release에 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          name: "할일앱 ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
